<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DanLab PRO | System Restore v5.2</title>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #0a0a0a; --sidebar: #121212; --border: #222; --accent: #0078d4; --text: #d4d4d4; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #panic-screen { display: none; background: white; color: black; padding: 60px 15%; height: 100vh; position: fixed; z-index: 9999; width: 100%; box-sizing: border-box; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e1e1e; height: 40px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); justify-content: space-between; font-size: 13px; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .explorer { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .explorer-header { padding: 15px; font-size: 11px; font-weight: bold; color: #666; display: flex; justify-content: space-between; align-items: center; }
        .file-list { flex: 1; overflow-y: auto; }
        .file-item { padding: 10px 15px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #888; border-bottom: 1px solid #1a1a1a; }
        .file-item.active { background: rgba(0, 120, 212, 0.1); color: var(--accent); border-left: 3px solid var(--accent); }
        .editor-zone { flex: 1; display: flex; flex-direction: column; background: #0d0d0d; }
        .tabs { background: var(--sidebar); height: 35px; display: flex; border-bottom: 1px solid var(--border); }
        .tab { padding: 0 15px; display: flex; align-items: center; font-size: 12px; color: #666; border-right: 1px solid var(--border); cursor: pointer; }
        .tab.active { background: #0d0d0d; color: #fff; border-top: 2px solid var(--accent); }
        textarea { flex: 1; background: transparent; color: #9cdcfe; border: none; padding: 25px; font-family: 'JetBrains Mono', monospace; font-size: 14px; outline: none; resize: none; line-height: 1.6; }
        .preview-zone { width: 45%; background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; background: #000; }
        .run-btn { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        footer { background: var(--accent); height: 22px; font-size: 11px; display: flex; align-items: center; padding: 0 15px; color: white; justify-content: space-between; }
    </style>
</head>
<body>

<div id="panic-screen">
    <h1>Restoration Mode: Academic Archive</h1>
    <p>System files recovered successfully. Computational linguistics terminal active.</p>
</div>

<div class="app" id="main-ui">
    <header>
        <div><b style="color:var(--accent)">DanLab PRO v5.2</b> &nbsp; <span style="opacity:0.5">File Edit Run</span></div>
        <div id="clock-display" style="font-weight:bold; color: #fff;">00:00</div>
    </header>
    <div class="main">
        <div class="explorer">
            <div class="explorer-header">PROJECT FILES <i data-lucide="file-plus" style="width:16px; cursor:pointer;" onclick="createNewFile()"></i></div>
            <div id="file-list" class="file-list"></div>
        </div>
        <div class="editor-zone">
            <div class="tabs" id="tabs-bar"></div>
            <textarea id="code-editor" spellcheck="false" oninput="saveCurrentFile()"></textarea>
            <div style="padding: 10px; background: #1e1e1e; display: flex; gap: 10px;">
                <button onclick="localStorage.clear(); location.reload();" style="background:#ff4444; color:white; border:none; padding:5px 10px; cursor:pointer; font-size:10px;">HARD RESET</button>
                <span style="font-size:10px; color:#555;">(If files disappear, click Reset)</span>
            </div>
        </div>
        <div class="preview-zone"><iframe id="output-view"></iframe></div>
    </div>
    <button class="run-btn" onclick="executeDanScript()">▶ RUN CODE</button>
    <footer>
        <div>Engine: DanScript 5.2 | Developer: Dan (13 y.o.)</div>
        <div id="file-info">Initializing...</div>
    </footer>
</div>

<script>
    // Глобальные переменные
    let files = {};
    let currentFile = "";

    function startApp() {
        lucide.createIcons();
        
        // 1. ПРИНУДИТЕЛЬНАЯ ЗАГРУЗКА
        const savedData = localStorage.getItem('dan_v5_files');
        if (!savedData || savedData === '{}') {
            files = {
                "main.ds": "# DanScript v5.2\nspawn.character(\"robot\")\nchar.say(\"System Restored!\")\n\nprint(\"Ready to code\")",
                "hello.ds": "print(\"Hello world!\")"
            };
            localStorage.setItem('dan_v5_files', JSON.stringify(files));
        } else {
            files = JSON.parse(savedData);
        }

        currentFile = localStorage.getItem('dan_last_file') || Object.keys(files)[0];
        
        // 2. ЗАПУСК ЧАСОВ
        updateClock();
        setInterval(updateClock, 1000);

        renderFiles();
        switchFile(currentFile);
        executeDanScript();
    }

    function renderFiles() {
        const list = document.getElementById('file-list');
        const tabs = document.getElementById('tabs-bar');
        list.innerHTML = ''; tabs.innerHTML = '';
        
        Object.keys(files).forEach(name => {
            list.innerHTML += `<div class="file-item ${name === currentFile ? 'active' : ''}" onclick="switchFile('${name}')">📄 ${name}</div>`;
            tabs.innerHTML += `<div class="tab ${name === currentFile ? 'active' : ''}" onclick="switchFile('${name}')">${name}</div>`;
        });
        lucide.createIcons();
    }

    function switchFile(name) {
        if (!files[name]) name = Object.keys(files)[0];
        currentFile = name;
        localStorage.setItem('dan_last_file', name);
        document.getElementById('code-editor').value = files[name];
        document.getElementById('file-info').innerText = "Editing: " + name;
        renderFiles();
    }

    function saveCurrentFile() {
        files[currentFile] = document.getElementById('code-editor').value;
        localStorage.setItem('dan_v5_files', JSON.stringify(files));
    }

    function createNewFile() {
        let n = prompt("File name:");
        if(n) { 
            if(!n.endsWith('.ds')) n += '.ds';
            files[n] = "# New Script"; 
            switchFile(n); 
            saveCurrentFile();
        }
    }

    function updateClock() {
        const clockEl = document.getElementById('clock-display');
        if (clockEl) {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }
    }

    function executeDanScript() {
        const code = document.getElementById('code-editor').value;
        const doc = document.getElementById('output-view').contentWindow.document;
        doc.open();
        doc.write('<style>body{background:#000;color:#0f0;font-family:monospace;padding:20px;} .robot{font-size:60px;}</style><div id="o"></div>');
        if(code.includes('spawn.character("robot")')) doc.write('<div class="robot">🤖</div>');
        if(code.includes('print')) doc.write('<div>> Script Active</div>');
        doc.close();
    }

    window.addEventListener('keydown', e => {
        if(e.key === 'Escape') {
            const p = document.getElementById('panic-screen');
            const u = document.getElementById('main-ui');
            const isH = p.style.display === 'none' || !p.style.display;
            p.style.display = isH ? 'block' : 'none';
            u.style.display = isH ? 'none' : 'flex';
        }
    });

    // Прямой вызов после загрузки DOM
    document.addEventListener('DOMContentLoaded', startApp);
</script>
</body>
</html>
