<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLab | Professional Environment</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --panel-dark: #252526;
            --accent: #007acc;
            --text: #cccccc;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
        }

        /* Шапка как в VS Code */
        header {
            height: 40px;
            background-color: #333333;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            border-bottom: 1px solid #444;
        }

        .logo { font-weight: bold; color: #fff; letter-spacing: 1px; }

        /* Контейнер для редактора и превью */
        .main-container {
            display: flex;
            height: calc(100vh - 40px);
        }

        .editor-side, .preview-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Текстовое поле в стиле кода */
        textarea {
            flex: 1;
            background-color: var(--panel-dark);
            color: #d4d4d4;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        textarea:focus { border-color: var(--accent); }

        /* Кнопки */
        .controls {
            padding: 10px 0;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 20px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { background-color: #005a9e; }
        
        .btn-clear { background-color: #444; }
        .btn-clear:hover { background-color: #555; }

        /* Окно предпросмотра */
        iframe {
            flex: 1;
            background-color: white; /* Чтобы игры было видно четко */
            border: none;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .label {
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">DEVLAB_SANDBOX v1.0</div>
    <div style="font-size: 12px;">Mode: Educational / Development</div>
</header>

<div class="main-container">
    <div class="editor-side">
        <div class="label">Source Code (HTML/JS/CSS)</div>
        <textarea id="code" placeholder="<html>
<body>
  <h1>Hello World</h1>
  <script>
    console.log('Ready');
  </script>
</body>
</html>"></textarea>
        <div class="controls">
            <button onclick="run()">▶ Скомпилировать и Запустить</button>
            <button class="btn-clear" onclick="clearCode()">Очистить</button>
        </div>
    </div>

    <div class="preview-side">
        <div class="label">Live Preview Window</div>
        <iframe id="preview"></iframe>
    </div>
</div>

<script>
    function run() {
        const code = document.getElementById('code').value;
        const preview = document.getElementById('preview').contentWindow.document;
        preview.open();
        preview.write(code);
        preview.close();
    }

    function clearCode() {
        document.getElementById('code').value = '';
        document.getElementById('preview').src = "about:blank";
    }

    // Сохранение кода в браузере автоматически
    const area = document.getElementById('code');
    area.value = localStorage.getItem('savedCode') || '';
    
    area.addEventListener('input', () => {
        localStorage.setItem('savedCode', area.value);
    });
</script>

</body>
</html>
