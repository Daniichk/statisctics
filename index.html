<!DOCTYPE html>
<html>
<head><title>My Project</title></head>
<body>
    <textarea id="code" placeholder="Вставь HTML/JS код сюда..." style="width:100%; height:300px;"></textarea>
    <button onclick="run()">Запустить игру</button>
    <iframe id="preview" style="width:100%; height:500px; border:1px solid #ccc;"></iframe>
    <script>
        function run() {
            var code = document.getElementById('code').value;
            var preview = document.getElementById('preview').contentWindow.document;
            preview.open();
            preview.write(code);
            preview.close();
        }
    </script>
</body>
</html>
