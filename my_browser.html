<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Compound Interest Calculator - Math Project</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .nav { background: #1a73e8; padding: 15px; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input { flex: 1; padding: 10px; border: none; border-radius: 4px; outline: none; }
        button { background: #fff; color: #1a73e8; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #viewer { flex: 1; background: white; padding: 20px; overflow-y: auto; color: #333; }
        .mask { color: #888; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="nav">
    <input type="text" id="target" placeholder="Введите домен (например, wikipedia.org или yewtu.be)">
    <button onclick="render()">CALCULATE</button>
</div>

<div id="viewer">
    <div style="text-align: center; margin-top: 100px;">
        <h2>Система визуализации данных v7.0</h2>
        <p>Введите URL и нажмите CALCULATE для извлечения данных в обход фильтрации.</p>
        <p class="mask">Current Node: GitHub-Codespace-US-West</p>
    </div>
</div>

<script>
async function render() {
    const input = document.getElementById('target').value;
    const viewer = document.getElementById('viewer');
    
    let url = input;
    if (!url.startsWith('http')) url = 'https://' + url;

    viewer.innerHTML = "<h4>Инициализация защищенного потока... (Blocksi не видит данных)</h4>";

    try {
        // Мы используем публичный API AllOrigins, чтобы получить код сайта как текст JSON
        // Это обходит блокировку ссылок, так как браузер просто "читает текст"
        const response = await fetch(`https://api.allorigins.win{encodeURIComponent(url)}`);
        const data = await response.json();
        
        // Вставляем содержимое сайта прямо в наш документ
        // Теперь Blocksi думает, что это просто часть вашего файла статистики
        viewer.innerHTML = data.contents;

        // Фикс для ссылок внутри загруженного сайта
        const links = viewer.getElementsByTagName('a');
        for (let link of links) {
            link.onclick = (e) => {
                e.preventDefault();
                document.getElementById('target').value = link.href;
                render();
            };
        }
        
        // Добавляем тег base, чтобы картинки грузились правильно
        const base = document.createElement('base');
        base.href = url;
        document.head.appendChild(base);

    } catch (error) {
        viewer.innerHTML = "<h3 style='color:red;'>ОШИБКА ДОСТУПА. Попробуйте другой домен или зеркало.</h3>";
    }
}
</script>

</body>
</html>
