<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DanLab Pro | Ultimate Edition</title>
    <!-- Подключаем красивые иконки -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg: #0d0d0d;
            --sidebar: #151515;
            --accent: #0078d4;
            --accent-hover: #005a9e;
            --border: #2b2b2b;
            --text-main: #e1e1e1;
            --text-dim: #858585;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg); color: var(--text-main);
            overflow: hidden;
        }

        /* --- UI UPGRADE --- */
        .app { display: flex; flex-direction: column; height: 100vh; }

        header {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            height: 45px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
            z-index: 100;
        }

        .main { display: flex; flex: 1; overflow: hidden; background: var(--bg); }

        /* Sidebar Explorer */
        .explorer {
            width: 240px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .explorer-header {
            padding: 15px 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item {
            padding: 8px 20px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
            transition: 0.2s;
        }

        .file-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .file-item.active { background: rgba(0, 120, 212, 0.1); color: var(--accent); border-left: 3px solid var(--accent); }

        /* Editor Section */
        .editor-container { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        
        .tabs-bar {
            background: var(--sidebar);
            height: 40px;
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-dim);
            border-right: 1px solid var(--border);
            cursor: pointer;
            background: #1a1a1a;
        }

        .tab.active { background: var(--bg); color: #fff; border-top: 2px solid var(--accent); }

        textarea {
            flex: 1;
            background: transparent;
            color: #9cdcfe;
            border: none;
            padding: 25px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 15px;
            line-height: 1.6;
            outline: none;
            resize: none;
        }

        /* Preview Side */
        .preview {
            width: 45%;
            background: #000;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            padding: 10px 20px;
            font-size: 11px;
            background: #111;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        iframe { flex: 1; border: none; background: #000; }

        /* Floating Run Button */
        .run-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 120, 212, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 200;
            transition: 0.3s;
        }

        .run-btn:hover { transform: translateY(-3px); background: var(--accent-hover); }

        footer {
            background: var(--accent);
            height: 25px;
            font-size: 11px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: #fff;
            justify-content: space-between;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>

<div class="app" id="main-ui">
    <header>
        <div style="display:flex; gap:20px; font-size:13px;">
            <span style="font-weight:700; color:var(--accent);">DanLab PRO</span>
            <span style="color:var(--text-dim);">File</span>
            <span style="color:var(--text-dim);">Edit</span>
            <span style="color:var(--text-dim);">Terminal</span>
        </div>
        <div id="time" style="font-weight:600; font-size:13px; opacity:0.7;">00:00</div>
    </header>

    <div class="main">
        <div class="explorer">
            <div class="explorer-header">
                <span>PROJECT FILES</span>
                <i data-lucide="plus-circle" style="width:16px; cursor:pointer;" onclick="createNewFile()"></i>
            </div>
            <div class="file-list" id="file-list"></div>
        </div>

        <div class="editor-container">
            <div class="tabs-bar" id="tabs-bar"></div>
            <textarea id="code-editor" spellcheck="false" oninput="saveCurrentFile()"></textarea>
        </div>

        <div class="preview">
            <div class="preview-header">LIVE CONSOLE & PREVIEW</div>
            <iframe id="output-view"></iframe>
        </div>
    </div>

    <button class="run-btn" onclick="executeCode()">
        <i data-lucide="play" style="width:18px;"></i> RUN SYSTEM
    </button>

    <footer>
        <div style="display:flex; gap:15px;">
            <span><i data-lucide="cpu" style="width:12px; vertical-align:middle;"></i> DanScript 3.0</span>
            <span><i data-lucide="user" style="width:12px; vertical-align:middle;"></i> Developer: Dan (13 y.o.)</span>
        </div>
        <div id="file-info">main.ds</div>
    </footer>
</div>

<script>
    // Инициализация иконок
    lucide.createIcons();
    
    // Остальная твоя логика файлов и интерпретатора остается такой же, 
    // но обнови функцию renderFiles(), чтобы она добавляла иконки:

    function renderFiles() {
        const list = document.getElementById('file-list');
        const tabs = document.getElementById('tabs-bar');
        list.innerHTML = '';
        tabs.innerHTML = '';

        Object.keys(files).forEach(name => {
            const item = document.createElement('div');
            item.className = `file-item ${name === currentFile ? 'active' : ''}`;
            item.innerHTML = `<i data-lucide="file-code" style="width:14px;"></i> ${name}`;
            item.onclick = () => switchFile(name);
            list.appendChild(item);

            const tab = document.createElement('div');
            tab.className = `tab ${name === currentFile ? 'active' : ''}`;
            tab.innerHTML = `<i data-lucide="file-json" style="width:12px;"></i> ${name}`;
            tab.onclick = () => switchFile(name);
            tabs.appendChild(tab);
        });
        lucide.createIcons(); // Перерисовать иконки
    }
</script>
</body>
</html>
